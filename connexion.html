<script>
    // Fonction pour l'animation du bouton et changer de formulaire
    function switchForm(type) {
        const btnBg = document.getElementById('btn-bg');
        const btns = document.querySelectorAll('.toggle-btn');
        const formLogin = document.getElementById('form-login');
        const formRegister = document.getElementById('form-register');

        if (type === 'login') {
            btnBg.style.left = '0';
            btns[0].classList.add('active');
            btns[1].classList.remove('active');
            formLogin.classList.add('active');
            formRegister.classList.remove('active');
        } else {
            btnBg.style.left = '50%';
            btns[1].classList.add('active');
            btns[0].classList.remove('active');
            formRegister.classList.add('active');
            formLogin.classList.remove('active');
        }
    }

    // --- CONFIGURATION : TON ADRESSE VERCEL ---
    const API_URL = "https://atelier-voeux-git-main-kchamsennahar-jpgs-projects.vercel.app/api";

    // --- 1. FONCTION SE CONNECTER ---
    async function seConnecter() {
        const email = document.getElementById('login-email').value;
        const mdp = document.getElementById('login-password').value;
        
        try {
            const response = await fetch(`${API_URL}/connexion`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, mdp: mdp })
            });
            
            const resultat = await response.json();
            
            if (resultat.message === "OK") {
                alert("Bienvenue " + resultat.nom + " !");
                // Redirection selon le rôle
                if (resultat.role === 'admin') {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "index.html"; // Ou page profil
                }
            } else {
                alert("Erreur : " + resultat.erreur);
            }
        } catch (erreur) {
            alert("Erreur de connexion au serveur.");
        }
    }

    // --- 2. FONCTION S'INSCRIRE ---
    async function sInscrire() {
        const role = document.getElementById('reg-role').value;
        const nom = document.getElementById('reg-nom').value;
        const email = document.getElementById('reg-email').value;
        const mdp = document.getElementById('reg-password').value;
        
        const donnees = { nom, email, mot_de_passe: mdp, role };

        try {
            const response = await fetch(`${API_URL}/inscription`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(donnees)
            });
            
            const resultat = await response.json();
            
            if (resultat.message) {
                alert("Inscription réussie ! Vous pouvez maintenant vous connecter.");
                switchForm('login'); // On renvoie l'utilisateur vers la connexion
            } else {
                alert("Erreur : " + resultat.erreur);
            }
        } catch (erreur) {
            alert("Impossible de joindre le serveur.");
        }
    }
</script>
