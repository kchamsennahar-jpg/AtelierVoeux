<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | L'Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #C4A45C; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .toggle { cursor: pointer; color: blue; font-size: 12px; margin-top: 10px; display: block; }
        #form-register { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2 id="title">Connexion</h2>
    
    <form id="form-login" onsubmit="event.preventDefault(); seConnecter();">
        <input type="email" id="l-email" placeholder="Email" required>
        <input type="password" id="l-mdp" placeholder="Mot de passe" required>
        <button type="submit">Se connecter</button>
        <span class="toggle" onclick="toggle()">Pas encore de compte ? S'inscrire</span>
    </form>

    <form id="form-register" onsubmit="event.preventDefault(); sInscrire();">
        <select id="r-role"><option value="client">Client</option><option value="prestataire">Prestataire</option></select>
        <input type="text" id="r-nom" placeholder="Nom complet" required>
        <input type="email" id="r-email" placeholder="Email" required>
        <input type="password" id="r-mdp" placeholder="Mot de passe" required>
        <button type="submit">Créer mon compte</button>
        <span class="toggle" onclick="toggle()">Déjà inscrit ? Se connecter</span>
    </form>
</div>

<script>
    const API = "https://atelier-voeux-git-main-kchamsennahar-jpgs-projects.vercel.app/api";

    function toggle() {
        const isLogin = document.getElementById('form-login').style.display !== 'none';
        document.getElementById('form-login').style.display = isLogin ? 'none' : 'block';
        document.getElementById('form-register').style.display = isLogin ? 'block' : 'none';
        document.getElementById('title').innerText = isLogin ? 'Inscription' : 'Connexion';
    }

    async function sInscrire() {
        const data = {
            nom: document.getElementById('r-nom').value,
            email: document.getElementById('r-email').value,
            mot_de_passe: document.getElementById('r-mdp').value,
            role: document.getElementById('r-role').value
        };
        try {
            const res = await fetch(`${API}/inscription`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const resData = await res.json();
            alert(resData.message || resData.erreur);
            if(resData.message) toggle();
        } catch(e) { alert("Erreur serveur"); }
    }

    async function seConnecter() {
        const data = {
            email: document.getElementById('l-email').value,
            mdp: document.getElementById('l-mdp').value
        };
        try {
            const res = await fetch(`${API}/connexion`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const resData = await res.json();
            if(resData.message === "OK") {
                alert("Bonjour " + resData.nom);
                window.location.href = (resData.role === 'admin') ? "admin.html" : "index.html";
            } else { alert(resData.erreur); }
        } catch(e) { alert("Erreur serveur"); }
    }
</script>

</body>
</html>
