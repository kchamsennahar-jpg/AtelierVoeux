<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tous les prestataires | L'Atelier des Vœux</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Les mêmes couleurs et styles que ton accueil */
        :root {
            --bg-color: #FDFCF9;
            --white: #FFFFFF;
            --gold: #C4A45C;
            --gold-light: #E8D3A2;
            --text-dark: #2C2C2C;
            --text-gray: #6B6B6B;
            --border-color: #EFEFEF;
            --dark-btn: #2b2b2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lato', sans-serif; background-color: var(--bg-color); color: var(--text-dark); overflow-x: hidden; }
        h1, h2, h3, h4, .serif-font { font-family: 'Playfair Display', serif; font-weight: 400; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* NAVBAR */
        .navbar {
            background-color: var(--bg-color); height: 80px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 50px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .menu-icon { font-size: 20px; cursor: pointer; color: var(--text-dark); }
        .logo { font-family: 'Playfair Display', serif; font-size: 26px; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--gold); }
        .nav-links { display: flex; gap: 30px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-gray); }
        .nav-links a:hover { color: var(--gold); }
        .btn-outline { border: 1px solid var(--gold); padding: 10px 25px; border-radius: 30px; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--gold); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-outline:hover { background: var(--gold); color: var(--white); }

        /* HEADER DE LA PAGE */
        .page-header {
            background-color: var(--white);
            padding: 60px 50px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        .page-header h1 { font-size: 42px; margin-bottom: 15px; color: var(--text-dark); }
        .page-header p { color: var(--text-gray); font-size: 16px; }

        /* GRILLE DES PRESTATAIRES */
        .section-padding { padding: 60px 50px; max-width: 1400px; margin: 0 auto; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        .item-card { background: var(--white); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); transition: 0.3s; }
        .item-card:hover { box-shadow: 0 15px 40px rgba(0,0,0,0.06); transform: translateY(-5px); }
        .item-img { height: 250px; background-size: cover; background-position: center; position: relative; }
        .rating-badge { position: absolute; top: 15px; right: 15px; background: var(--white); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .rating-badge i { color: var(--gold); font-size: 10px; }
        .item-body { padding: 25px; }
        .item-category { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; font-weight: 700; }
        .item-title { font-size: 26px; color: var(--text-dark); margin-bottom: 25px; }
        .item-footer { border-top: 1px solid var(--border-color); padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .item-price { font-size: 13px; color: var(--text-gray); }
        .item-price span { font-size: 15px; color: var(--text-dark); font-family: 'Playfair Display', serif; }
        .btn-privilege { background: var(--dark-btn); color: var(--white); border: none; padding: 10px 20px; border-radius: 30px; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-privilege:hover { background: var(--gold); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <i class="fa-regular fa-sun"></i> L'Atelier des Vœux
            </a>
        </div>
        
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="prestataires.html" style="color: var(--gold);">Tous les prestataires</a></li>
            <li><a href="categories.html">Catégories</a></li>
            <li><a href="reservations.html">Mes réservations</a></li>
        </ul>

        <div class="btn-outline">
            <i class="fa-regular fa-user"></i> Connexion
        </div>
    </nav>

    <header class="page-header">
        <h1>Tous nos prestataires</h1>
        <p>Découvrez l'ensemble de nos artisans partenaires pour rendre votre événement inoubliable.</p>
    </header>

    <section class="section-padding">
        <div class="items-grid" id="tous-les-prestataires">
            </div>
    </section>

    <script>
        function afficherPrestataires(data) {
            const container = document.getElementById('tous-les-prestataires');
            container.innerHTML = '';
            
            data.forEach(service => {
                container.innerHTML += `
                    <div class="item-card">
                        <div class="item-img" style="background-image: url('${service.image}');">
                            <div class="rating-badge"><i class="fa-solid fa-star"></i> ${service.note}</div>
                        </div>
                        <div class="item-body">
                            <span class="item-category">${service.categorie}</span>
                            <h3 class="item-title">${service.nom}</h3>
                            <div class="item-footer">
                                <div class="item-price">Contact : <br><span>Sur devis</span></div>
                                <button class="btn-privilege">Réserver</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // On appelle ton API Python exactement comme sur l'accueil
        fetch('http://127.0.0.1:8000/api/prestataire')
            .then(response => response.json())
            .then(data => {
                const formattedData = data.map(d => ({
                    categorie: d.ville || d.Ville || "Marrakech", 
                    nom: d.nomEntreprise || d.nomentreprise || d.nom || "Prestataire inconnu",              
                    note: d.noteMoyenne || d.notemoyenne || "5.0",      
                    image: "https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=800&q=80"
                }));
                afficherPrestataires(formattedData);
            })
            .catch(error => {
                console.error("Erreur de liaison :", error);
                document.getElementById('tous-les-prestataires').innerHTML = "<p>Impossible de charger les prestataires pour le moment. Vérifie que ton serveur Python est allumé.</p>";
            });
    </script>
</body>
</html>
