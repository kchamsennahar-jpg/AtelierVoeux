<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | L'Atelier des Vœux</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-side: #1a1a1a; --bg-main: #f8f9fa; --gold: #C4A45C; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lato', sans-serif; display: flex; background: var(--bg-main); }

        /* Barre latérale (Sidebar) */
        .sidebar { width: 260px; height: 100vh; background: var(--bg-side); color: white; padding: 30px 20px; position: fixed; }
        .sidebar h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 40px; font-size: 22px; }
        .menu-item { padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #bbb; margin-bottom: 5px; }
        .menu-item:hover, .menu-item.active { background: rgba(196, 164, 92, 0.2); color: var(--gold); }

        /* Contenu Principal */
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
        .header-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 14px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card p { font-size: 28px; font-weight: 700; color: var(--bg-side); }

        /* Tableaux */
        .data-section { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .data-section h2 { margin-bottom: 20px; font-family: 'Playfair Display', serif; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid var(--bg-main); color: #888; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid var(--bg-main); font-size: 14px; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-client { background: #e3f2fd; color: #1976d2; }
        .badge-pres { background: #f3e5f5; color: #7b1fa2; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Admin Atelier</h2>
        <div class="menu-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</div>
        <div class="menu-item"><i class="fa-solid fa-users"></i> Utilisateurs</div>
        <div class="menu-item"><i class="fa-solid fa-handshake"></i> Prestataires</div>
        <div class="menu-item"><i class="fa-solid fa-calendar-check"></i> Réservations</div>
        <a href="index.html" style="text-decoration: none; color: inherit;">
            <div class="menu-item" style="margin-top: 50px;"><i class="fa-solid fa-arrow-left"></i> Voir le site</div>
        </a>
    </div>

    <div class="main-content">
        <div class="header-stats">
            <div class="stat-card">
                <h3>Total Clients</h3>
                <p id="count-clients">--</p>
            </div>
            <div class="stat-card">
                <h3>Total Prestataires</h3>
                <p id="count-pres">--</p>
            </div>
            <div class="stat-card">
                <h3>Réservations</h3>
                <p>12</p>
            </div>
        </div>

        <div class="data-section">
            <h2>Gestion des Profils</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Rôle</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // On va chercher les vrais gens dans ta base via Python !
        async function loadAdminData() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/prestataire'); // On commence par les prestataires
                const data = await response.json();
                
                const tableBody = document.getElementById('admin-table-body');
                document.getElementById('count-pres').innerText = data.length;
                
                tableBody.innerHTML = '';
                data.forEach(p => {
                    tableBody.innerHTML += `
                        <tr>
                            <td><strong>${p.nomEntreprise || p.nom}</strong></td>
                            <td>${p.email || 'contact@atelier.com'}</td>
                            <td><span class="badge badge-pres">Prestataire</span></td>
                            <td><button style="color: red; border:none; background:none; cursor:pointer;">Supprimer</button></td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Erreur admin:", error);
            }
        }
        loadAdminData();
    </script>
</body>
</html>
